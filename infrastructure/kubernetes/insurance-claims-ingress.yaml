apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: insurance-claims-ingress
  namespace: insurance-claims
  annotations:
    alb.ingress.kubernetes.io/scheme: internet-facing
    alb.ingress.kubernetes.io/target-type: ip
    alb.ingress.kubernetes.io/load-balancer-name: insurance-claims-alb
    alb.ingress.kubernetes.io/healthcheck-path: /
    alb.ingress.kubernetes.io/healthcheck-interval-seconds: '30'
    alb.ingress.kubernetes.io/healthcheck-timeout-seconds: '5'
    alb.ingress.kubernetes.io/healthy-threshold-count: '2'
    alb.ingress.kubernetes.io/unhealthy-threshold-count: '3'
    # Listen on HTTP only (no TLS for demo)
    alb.ingress.kubernetes.io/listen-ports: '[{"HTTP": 80}]'
spec:
  ingressClassName: alb
  rules:
  - http:
      paths:
      # Web Interface - Root path
      - path: /
        pathType: Prefix
        backend:
          service:
            name: claims-web-interface
            port:
              number: 8080

      # Coordinator API
      - path: /api
        pathType: Prefix
        backend:
          service:
            name: coordinator-service
            port:
              number: 8000

      # Claims Simulator
      - path: /simulator
        pathType: Prefix
        backend:
          service:
            name: claims-simulator-service
            port:
              number: 8091

      # Shared Memory Service
      - path: /memory
        pathType: Prefix
        backend:
          service:
            name: shared-memory-service
            port:
              number: 8001
